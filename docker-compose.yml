services:
  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  app:
    env_file:
      - .env
    build: .
    environment:
      REDIS_HOST: redis
      DB_HOST: mariadb
      DB_USER: root
      DB_PASSWORD: 1234
      DB_NAME: log_ai_db
    depends_on:
      - redis
      - mariadb

  redis:
    image: redis:latest

  mariadb:
    image: mariadb:latest
    environment:
      MARIADB_ROOT_PASSWORD: 1234
      MARIADB_DATABASE: log_ai_db
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - mariadb_data:/var/lib/mysql

volumes:
  mariadb_data:
